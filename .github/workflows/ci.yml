name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ragdb_test
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U raguser"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run migrations & tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DATABASE_URL: postgres://raguser:ragpass@localhost:5432/ragdb_test
        run: |
          python manage.py migrate
          python manage.py test

  frontend-lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm install
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t rag-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t rag-frontend:ci ./frontend
